<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LEGO Robot Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #334155;
  color: white;
}

button:hover {
  background: #475569;
}

input[type=range] {
  width: 100%;
}

.status {
  font-size: 18px;
  line-height: 1.6;
}

#direction {
  font-size: 50px;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>LEGO Robot Dashboard</header>

<div class="container">

  <!-- CONTROL -->
  <div class="card">
    <h2>Controls</h2>

    <h3>Movement</h3>
    <button onclick="turnLeft()">⬅ Left</button>
    <button onclick="turnRight()">Right ➡</button>

    <h3>Speed</h3>
    <button onclick="goSlower()">- Slower</button>
    <button onclick="goFaster()">Faster +</button>

    <input type="range" min="0" max="100" value="0"
      oninput="lego.speed = parseInt(this.value); sendData();">

    <h3>Power</h3>
    <button onclick="startlego()">START</button>
    <button onclick="stoplego()">STOP</button>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h2>Status</h2>

    <div class="status" id="legoStatus">
      Speed: 0<br>
      Turn: 0<br>
      Run: 0
    </div>

    <div id="direction">⬆</div>

    <h3>Server Response</h3>
    <div id="settings">Waiting...</div>

    <h3>Raw JSON</h3>
    <div id="setvalues">...</div>
  </div>

</div>

<script>
var lego = {
  id: 1,
  run: 1,
  speed: 0,
  turn: 0,
  aika: 0,
  vari:0,
  syvyys:0,
  distanceForward:0
};

function sendData() {
  let url = "/rest/lego/setvalues/" 
            + lego.run + "/" 
            + lego.speed + "/" 
            + lego.turn +"/"
             + lego.vari +"/"
            + lego.syvyys +"/"
            + lego.distanceForward;

  var xhttp = new XMLHttpRequest();

  document.getElementById("setvalues").innerHTML = url;

  xhttp.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      var settings = JSON.parse(this.responseText);

      document.getElementById("settings").innerHTML =
        "ID=" + settings.id +
        " Run=" + settings.run +
        " Speed=" + settings.speed +
        " Turn=" + settings.turn;
        " Vari=" + settings.vari +
        " Syvyys=" + settings.syvyys +
        " Etaisyys=" + settings.distanceForward;
        updateUI();
    }
  };

  setInterval(function() {
    fetch('/rest/lego/getvalues')
        .then(response => response.text())
        .then(data => {
            let parts = data.split('#');
            lego.run = parseInt(parts[1]);
            lego.speed = parseInt(parts[2]);
            lego.turn = parseInt(parts[3]);
            lego.vari = parseFloat(parts[4]);
            lego.syvyys = parseFloat(parts[5]);
            lego.distanceForward = parseFloat(parts[6]);
            
            updateUI(); 
        });
}, 1000);

  if (this.readyState == 4 && this.status == 200){
    var settings = JSON.parse(this.responseText);
    lego.id=settings.id;
    lego.run = settings.run;
    lego.speed = settings.speed;
    lego.turn = settings.turn;
    lego.vari = settings.vari;
    lego.syvyys = settings.syvyys;
    lego.distanceForward = settings.distanceForward;

    document.getElementById("settings").innerHTML=this.responseText;
    updateUI();
  }

  xhttp.open("GET", url, true);
  xhttp.send();
}


// Update UI
function updateUI() {
  document.getElementById("legoStatus").innerHTML =
    "Speed: " + lego.speed + "<br>" +
    "Turn: " + lego.turn + "<br>" +
    "Run: " + lego.run + "<br>" +
    "Vari:" + lego.vari + "<br>" +
    "Syvyys:" + lego.syvyys + "<br>" +
    "Etaisyys:" + lego.distanceForward;

  let dir = document.getElementById("direction");

  if (lego.turn > 0) dir.innerHTML = "➡";
  else if (lego.turn < 0) dir.innerHTML = "⬅";
  else dir.innerHTML = "⬆";
}
// Buttons
function turnLeft() {
  lego.turn -= 10;
  sendData();
}

function turnRight() {
  lego.turn += 10;
  sendData();
}

function goFaster() {
  lego.speed += 10;
  sendData();
}

function goSlower() {
  lego.speed -= 10;
  sendData();
}

function startlego() {
  lego.run = 1;
  sendData();
}

function stoplego() {
  lego.run = 0;
  sendData();
}

// KEYBOARD WASD CONTROLS
document.addEventListener("keydown", function(event) {

  // prevent accidental spam if typing later
  if (event.target.tagName === "INPUT") return;

  switch (event.key.toLowerCase()) {

    case "w":
      lego.speed += 10;
      sendData();
      break;

    case "s":
      lego.speed -= 10;
      sendData();
      break;

    case "a":
      lego.turn -= 10;
      sendData();
      break;

    case "d":
      lego.turn += 10;
      sendData();
      break;

    case " ":
      lego.run = 0;
      sendData();
      break;

    case "enter":
      lego.run = 1;
      sendData();
      break;
  }
});

</script>

</body>
</html>
